<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .scan { animation: scan 5s ease-in-out infinite; }
    .glow { animation: glow 3s ease-in-out infinite; }
    @keyframes scan { 0%,100% { transform: translateX(0); opacity: .15; } 50% { transform: translateX(680px); opacity: .55; } }
    @keyframes glow { 0%,100% { opacity: .35; } 50% { opacity: .9; } }
  </style>
  <rect width="1200" height="320" rx="26" fill="#111827"/>
  <rect class="scan" x="115" y="70" width="170" height="180" rx="22" fill="#f59e0b"/>
  <path d="M180 160 H1020" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
  <path d="M180 160 H1020" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-dasharray="22 18"/>
  <circle cx="250" cy="160" r="56" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="600" cy="160" r="56" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
  <circle cx="950" cy="160" r="56" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
  <circle class="glow" cx="250" cy="160" r="70" fill="#f59e0b" opacity=".2"/>
  <circle class="glow" cx="600" cy="160" r="70" fill="#22c55e" opacity=".2"/>
  <circle class="glow" cx="950" cy="160" r="70" fill="#38bdf8" opacity=".2"/>
  <text x="250" y="153" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="800" fill="#f8fafc">READ</text>
  <text x="250" y="181" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cbd5e1">observe</text>
  <text x="600" y="153" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="800" fill="#f8fafc">OPERATE</text>
  <text x="600" y="181" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cbd5e1">bounded</text>
  <text x="950" y="153" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" font-weight="800" fill="#f8fafc">AUDIT</text>
  <text x="950" y="181" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cbd5e1">evidence</text>
  <text x="600" y="64" text-anchor="middle" font-family="Segoe UI, Arial" font-size="36" font-weight="900" fill="#f8fafc">AWS IAM Access Lifecycle</text>
  <text x="600" y="270" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#cbd5e1">tiering, permission boundaries, review evidence</text>
</svg>

